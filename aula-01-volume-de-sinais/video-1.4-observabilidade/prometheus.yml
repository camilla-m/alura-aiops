global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus monitorando a si mesmo
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Node Exporter — métricas de hardware do host
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
