version: "3.8"

# Stack de Observabilidade Local — Vídeo 1.4
# Sobe Prometheus + Grafana + Loki para demonstrar os 3 pilares em prática
# Uso: docker compose up -d

services:
  # ---------------------------------------------------------------------------
  # Prometheus — coleta de métricas
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: aiops-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Grafana — visualização unificada (métricas + logs)
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:10.4.2
    container_name: aiops-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=aiops123
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Loki — coleta e consulta de logs
  # ---------------------------------------------------------------------------
  loki:
    image: grafana/loki:3.0.0
    container_name: aiops-loki
    ports:
      - "3100:3100"
    volumes:
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Promtail — agent que envia logs para o Loki
  # ---------------------------------------------------------------------------
  promtail:
    image: grafana/promtail:3.0.0
    container_name: aiops-promtail
    volumes:
      - /var/log:/var/log:ro
      - ./promtail-config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Node Exporter — métricas de hardware do host
  # ---------------------------------------------------------------------------
  node-exporter:
    image: prom/node-exporter:v1.8.0
    container_name: aiops-node-exporter
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc)($$|/)"
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
  loki_data:
